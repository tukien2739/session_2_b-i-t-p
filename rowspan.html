<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>table cơ bản</title>
</head>
<body>
   <section>
    <h2><b>[Cơ Bản] - Sử dụng thuộc tính rowspan</b></h2>
    <hr />
    <table border="1"> 
        <tr>
            <th>SST</th>
            <th>NAME</th>
            <th>AGE</th>
            <th>EMAIL</th>
            <th>STATUS</th>
            <!-- html - attribute
             colspan - dãn cột
             rowspan - dãn dòng -->
            <th colspan="3">ACTION</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Nguyễn Văn A</td>
            <td>18</td>
            <td>NguyenVanA@gmail.com</td>
            <td>Hoạt động</td>
            <td><button>Sửa</button></td>
            <td><button>Xóa</button></td>
            <td rowspan="4">Xóa tất cả</td>


        </tr>
        <tr>
            <td>2</td>
            <td>Trần Văn B</td>
            <td>23</td>
            <td>TranVanB@gmail.com</td>
            <td>Hoạt động</td>
            <td><button>Sửa</button></td>
            <td><button>Xóa</button></td>
        </tr>
        <tr>
            <td>3</td>
            <td>Phạm Thị C</td>
            <td>19</td>
            <td>PhamThiC@gmail.com</td>
            <td>Hoạt động</td>
            <td><button>Sửa</button></td>
            <td><button>Xóa</button></td>
        </tr>
        <tr>
            <td>4</td>
            <td>Phạm Văn D</td>
            <td>19</td>
            <td>PhamVanD@gmail.com</td>
            <td>Không hoạt động</td>
            <td><button>Sửa</button></td>
            <td><button>Xóa</button></td>
        </tr> 

    </table>
   </section>
</body>
</html>
